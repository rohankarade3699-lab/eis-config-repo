spring:
  application:
    name: claim-service

  datasource:
    url: jdbc:postgresql://localhost:5432/claim_db
    username: postgres
    password: Postgres

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
