spring:
  cloud:
    gateway:
      routes:

        - id: policy-openapi
          uri: lb://POLICY-SERVICE
          predicates:
            - Path=/policy-service/v3/api-docs
          filters:
            - RewritePath=/policy-service/(?<path>.*), /$\{path}

        - id: customer-openapi
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customer-service/v3/api-docs
          filters:
            - RewritePath=/customer-service/(?<path>.*), /$\{path}

        - id: claim-openapi
          uri: lb://CLAIM-SERVICE
          predicates:
            - Path=/claim-service/v3/api-docs
          filters:
            - RewritePath=/claim-service/(?<path>.*), /$\{path}

        - id: auth-openapi
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/(?<path>.*), /$\{path}




