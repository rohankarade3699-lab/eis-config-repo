spring:
  cloud:
    gateway:
      routes:

        - id: policy-service
          uri: http://localhost:8082
          predicates:
            - Path=/policies/**
          filters:
            - RewritePath=/policies/(?<segment>.*), /policies/${segment}

        - id: customer-service
          uri: http://localhost:8081
          predicates:
            - Path=/customers/**
          filters:
            - RewritePath=/customers/(?<segment>.*), /customers/${segment}

        - id: claim-service
          uri: http://localhost:8083
          predicates:
            - Path=/claims/**
          filters:
            - RewritePath=/claims/(?<segment>.*), /claims/${segment}

