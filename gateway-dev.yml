spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
         - id: policy-service
          uri: localhost:8082
          predicates:
            - Path=/policies/**
      

        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customers/**
          # filters:
          #   - StripPrefix=2

        - id: claim-service
          uri: lb://CLAIM-SERVICE
          predicates:
            - Path=/claims/**

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
