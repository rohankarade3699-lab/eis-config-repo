spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: policy-service
          uri: lb://POLICY-SERVICE
          predicates:
            - Path=/policies/**

        - id: customer-service
          uri: lb://CUSTOMER-SERVICE
          predicates:
            - Path=/customers/**

        - id: claim-service
          uri: lb://CLAIM-SERVICE
          predicates:
            - Path=/claims/**

