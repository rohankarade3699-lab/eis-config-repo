server:
  port:8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
       - id: policy-service
         uri: lb://POLICY-SERVICE
         predicates:
           - Path=/policy/**
         filters:
           - StripPrefix=1

       - id: customer-service
         uri: lb://CUSTOMER-SERVICE
         predicates:
            - Path=/customer/**
         filters:
              - StripPrefix=1

       - id: claim-service
         uri: lb://CLAIM-SERVICE
         predicates:
           - Path=/claim/**
         filters:
           - StripPrefix=1




