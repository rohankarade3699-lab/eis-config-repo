server:
  port:8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
       - id: policy-service
         uri: http://localhost:8082
         predicates:
           - Path=/policies/**
         # filters:
         #   - StripPrefix=1

       - id: customer-service
         uri: lb://CUSTOMER-SERVICE
         predicates:
            - Path=/customers/**
         # filters:
         #      - StripPrefix=1

       - id: claim-service
         uri: lb://CLAIM-SERVICE
         predicates:
           - Path=/claims/**
         # filters:
         #   - StripPrefix=1




