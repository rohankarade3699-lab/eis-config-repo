spring:
  application:
    name: customer-service

  datasource:
    url: jdbc:postgresql://prod-db:5432/customer_db
    username: prod_user
    password: ENC(encrypted-password)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: never

info:
  app:
    name: Customer Service
    version: 1.0
    description: Production service
