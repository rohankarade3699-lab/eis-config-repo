spring:
  application:
    name: claim-service

  datasource:
    url: jdbc:postgresql://prod-db:5432/claim_db
    username: prod_user
    password: ENC(encrypted-password)

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
